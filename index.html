<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Premium Dashboard</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Login Screen -->
    <section id="login-screen">
        <div class="login-card">
            <div class="logo-container">
                <img src="assets/github-logo.png" alt="GitHub Logo">
            </div>
            <h1>GitHub Issues Tracker</h1>
            <p class="login-subtitle">Sign in to manage your issues</p>
            <form id="login-form">
                <div class="field-wrapper">
                    <label class="field-label">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required>
                    <span class="field-helper">Default: admin</span>
                </div>
                <div class="field-wrapper">
                    <label class="field-label">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                    <span class="field-helper">Default: admin123</span>
                </div>
                <button type="submit" class="btn-sign-in">Sign In</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="demo-box">
                <p class="demo-header">Demo Credentials:</p>
                <div class="demo-info">
                    <p><strong>Username:</strong> admin</p>
                    <p><strong>Password:</strong> admin123</p>
                </div>
            </div>

            <p id="login-error" class="error-msg">Invalid credentials. Please try again.</p>
        </div>
    </section>

    <!-- Dashboard -->
    <main id="dashboard">
        <nav class="navbar">
            <div class="nav-left">
                <img src="assets/github-logo.png" alt="GitHub Logo" style="height: 32px;">
                <h2>GitHub Issues Tracker</h2>
            </div>
            <div class="nav-right">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search issues...">
                </div>
                <button class="btn-new-issue">+ New Issue</button>
                <button id="logout-btn" class="tab-btn" style="padding: 0.5rem 1rem;">Logout</button>
            </div>
        </nav>

        <section class="filter-section">
            <div class="tabs-container">
                <div class="tabs-box">
                    <button class="tab-btn active" data-filter="all">All</button>
                    <button class="tab-btn" data-filter="open">Open</button>
                    <button class="tab-btn" data-filter="closed">Closed</button>
                </div>
            </div>

            <div class="status-summary">
                <div class="status-left">
                    <div class="status-icon-bg">
                        <i class="fas fa-bullseye"></i>
                    </div>
                    <div class="status-info">
                        <h3 id="issue-count-display">0 Issues</h3>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="status-right">
                    <div class="status-marker">
                        <span class="dot-open"></span> Open
                    </div>
                    <div class="status-marker">
                        <span class="dot-closed"></span> Closed
                    </div>
                </div>
            </div>

            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p style="margin-top: 1rem; color: #6b7280;">Fetching issues...</p>
            </div>

            <div id="issues-container" class="issues-grid">
                <!-- Issues will be rendered here dynamically -->
            </div>
        </section>
    </main>

    <!-- Issue Detail Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-body">
                <!-- Detailed content will be injected here -->
            </div>
            <div class="modal-footer">
                <button id="modal-close" class="btn-close-modal">Close</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
